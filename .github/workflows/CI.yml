name: CI

# Sources
# - https://github.com/JuliaDocs/Documenter.jl/blob/master/.github/workflows/CI.yml
# - https://discourse.julialang.org/t/easy-workflow-file-for-setting-up-github-actions-ci-for-your-julia-package/49765
on:
  push:
    branches:
      - "master"
      - "release-"
    tags: "*"
  pull_request:
  # to allow manual tests: https://leonardomontini.dev/github-action-manual-trigger
  workflow_dispatch:

# Cancel previous runs of this workflow for the same pull request
# `github.head_ref`: https://stackoverflow.com/a/67939898/1404966
# `github.run_id`: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#example-using-a-fallback-value
concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      # Lets the Codecov upload authenticate via GitHub OIDC. The repository has no
      # CODECOV_TOKEN secret, and codecov-action v4+ rejects unauthenticated uploads
      # from this repository's own branches ("Token required because branch is
      # protected"). Fork PRs are not granted this permission; their uploads fail
      # without failing CI, matching previous behavior.
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        version:
          # we are excluding nightly builds because they can fail, and we want this to be a
          # required check
          - "1.12" # minimum Julia version that this package supports
          - "1" # automatically expands to latest stable 1.x release of Julia
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        arch:
          - x64
        include:
          # Designate one leg to carry once-per-run work: validating the large
          # CIFAR10 asset, and collecting and uploading coverage. Doing both on the
          # same leg keeps the coverage report inclusive of the CIFAR10 code path.
          # Keying on the permanent "1" (latest stable) selector means bumping the
          # minimum supported Julia version cannot silently disable this; `primary`
          # stays unset (falsy) on the other five legs.
          - os: ubuntu-latest
            version: "1"
            primary: true
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
          # macos-latest runners are Apple Silicon; requesting x64 there runs Julia
          # under Rosetta 2, which setup-julia v3 rejects unless forced. Forcing
          # preserves the long-standing tested binaries and check names; moving the
          # macOS legs to native aarch64 would be a separate, deliberate change.
          force-arch: ${{ matrix.os == 'macos-latest' }}
          show-versioninfo: true
      - uses: actions/cache@v6
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-test-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-test-${{ env.cache-name }}-
            ${{ runner.os }}-test-
            ${{ runner.os }}-
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        with:
          coverage: ${{ matrix.primary || false }}
        env:
          MIPVERIFY_RUN_LARGE_DATASET_TESTS: ${{ matrix.primary || false }}
      - uses: julia-actions/julia-processcoverage@v1
        if: matrix.primary
      - uses: codecov/codecov-action@v7
        if: matrix.primary
        with:
          files: lcov.info
          # Upload exactly the file julia-processcoverage produced instead of also
          # searching the workspace for anything coverage-shaped.
          disable_search: true
          use_oidc: true
          # Fail the job when the upload breaks: the action's lenient default let
          # rate-limited uploads drop silently and would equally hide a broken OIDC
          # setup. Fork PRs cannot obtain an OIDC token, so stay lenient there.
          fail_ci_if_error: ${{ !github.event.pull_request.head.repo.fork }}

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        id: setup-julia
        with:
          version: "1"
      - name: Compute documentation Julia package state restore keys
        id: docs-restore-keys
        env:
          RUNNER_OS: ${{ runner.os }}
          RUNNER_ARCH: ${{ runner.arch }}
          JULIA_VERSION: ${{ steps.setup-julia.outputs.julia-version }}
          PROJECT_HASH: ${{ hashFiles('Project.toml', 'docs/Project.toml') }}
        run: |
          version_prefix="${RUNNER_OS}-${RUNNER_ARCH}-docs-julia-${JULIA_VERSION}-"
          project_prefix="${version_prefix}projects-${PROJECT_HASH}-manifest-"
          {
            echo "unresolved=${project_prefix}unresolved"
            echo "project_prefix=${project_prefix}"
            echo "version_prefix=${version_prefix}"
            echo "legacy_version_prefix=${RUNNER_OS}-docs-julia-${JULIA_VERSION}-"
          } >> "$GITHUB_OUTPUT"
      - name: Restore documentation Julia package state
        id: docs-restore
        uses: actions/cache/restore@v6
        with:
          path: |
            ~/.julia/artifacts
            ~/.julia/compiled
            ~/.julia/packages
            ~/.julia/registries
          # The manifest is generated during instantiation. Use a sentinel lookup,
          # then seed from the newest cache for this project or Julia version.
          key: ${{ steps.docs-restore-keys.outputs.unresolved }}
          restore-keys: |
            ${{ steps.docs-restore-keys.outputs.project_prefix }}
            ${{ steps.docs-restore-keys.outputs.version_prefix }}
            ${{ steps.docs-restore-keys.outputs.legacy_version_prefix }}
      - run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()'
      - name: Compute final documentation Julia package state key
        id: docs-final-key
        env:
          PROJECT_PREFIX: ${{ steps.docs-restore-keys.outputs.project_prefix }}
          MANIFEST_HASH: ${{ hashFiles('docs/Manifest.toml') }}
        run: echo "key=${PROJECT_PREFIX}${MANIFEST_HASH}" >> "$GITHUB_OUTPUT"
      - run: |
          julia --project=docs -e '
            using Documenter: doctest
            using MIPVerify
            doctest(MIPVerify)'
      - run: julia --project=docs docs/make.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # I created a `DOCUMENTER_KEY` secret, via
          # https://discourse.julialang.org/t/easy-workflow-file-for-setting-up-github-actions-ci-for-your-julia-package/49765/46
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
      - name: Save documentation Julia package state
        if: ${{ success() && steps.docs-final-key.outputs.key != steps.docs-restore.outputs.cache-matched-key }}
        uses: actions/cache/save@v6
        with:
          path: |
            ~/.julia/artifacts
            ~/.julia/compiled
            ~/.julia/packages
            ~/.julia/registries
          key: ${{ steps.docs-final-key.outputs.key }}

  # JuliaFormatter check, based off of
  # https://github.com/julia-actions/julia-format/blob/096371fb8d24867760569a7a89359a677595503b/workflows/format_check.yml
  format-check-julia:
    name: "Check Formatting (.jl)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: "1"
      - name: "Run `format.sh` script (runs `JuliaFormatter.format` on all files)"
        run: ./scripts/format.sh
      - name: "Verify that running `JuliaFormatter.format` is a no-op."
        run: |
          # The backticks below are Julia Cmd-literal syntax, not shell substitution
          # accidentally left in single quotes.
          # shellcheck disable=SC2016
          julia -e '
          out = Cmd(`git diff --name-only`) |> read |> String
          if out == ""
              exit(0)
          else
              @error "Some files did not meet the formatting guidelines. Run ./scripts/format.sh to fix."
              write(stdout, "\nFiles not meeting formatting guidelines:\n")
              write(stdout, out)
              write(stdout, "\nRun ./scripts/format.sh to fix.")
              exit(1)
          end'

  format-check-python:
    name: "Check Formatting and Linting (.py)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: "Verify that Ruff does not find any code style issues."
        uses: astral-sh/ruff-action@v4.1.0
        with:
          # Keep this version in sync with scripts/format.sh.
          version: "0.15.21"
          args: "format --check --diff"
          src: "benchmarks/analysis/"
      - name: "Verify that Ruff does not find any lint issues."
        run: ruff check benchmarks/analysis/

  benchmark-tests:
    name: Benchmark Helper Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        id: setup-julia
        with:
          version: "1"
      - name: Compute benchmark Julia package state restore keys
        id: benchmark-restore-keys
        env:
          RUNNER_OS: ${{ runner.os }}
          RUNNER_ARCH: ${{ runner.arch }}
          JULIA_VERSION: ${{ steps.setup-julia.outputs.julia-version }}
          PROJECT_HASH: ${{ hashFiles('Project.toml', 'benchmarks/Project.toml', 'examples/Project.toml', 'test/Project.toml') }}
        run: |
          version_prefix="${RUNNER_OS}-${RUNNER_ARCH}-benchmarks-julia-${JULIA_VERSION}-"
          project_prefix="${version_prefix}projects-${PROJECT_HASH}-manifest-"
          {
            echo "unresolved=${project_prefix}unresolved"
            echo "project_prefix=${project_prefix}"
            echo "version_prefix=${version_prefix}"
            echo "legacy_version_prefix=${RUNNER_OS}-benchmarks-julia-${JULIA_VERSION}-"
          } >> "$GITHUB_OUTPUT"
      - name: Restore benchmark Julia package state
        id: benchmark-restore
        uses: actions/cache/restore@v6
        with:
          path: |
            ~/.julia/artifacts
            ~/.julia/compiled
            ~/.julia/packages
            ~/.julia/registries
          # The workspace manifest is generated during instantiation. Use a sentinel lookup,
          # then seed from the newest cache for this project or Julia version.
          key: ${{ steps.benchmark-restore-keys.outputs.unresolved }}
          restore-keys: |
            ${{ steps.benchmark-restore-keys.outputs.project_prefix }}
            ${{ steps.benchmark-restore-keys.outputs.version_prefix }}
            ${{ steps.benchmark-restore-keys.outputs.legacy_version_prefix }}
      - name: Instantiate benchmarks environment
        run: julia --project=benchmarks -e 'using Pkg; Pkg.develop(path="."); Pkg.instantiate()'
      - name: Compute final benchmark Julia package state key
        id: benchmark-final-key
        env:
          PROJECT_PREFIX: ${{ steps.benchmark-restore-keys.outputs.project_prefix }}
          MANIFEST_HASH: ${{ hashFiles('Manifest.toml') }}
        run: echo "key=${PROJECT_PREFIX}${MANIFEST_HASH}" >> "$GITHUB_OUTPUT"
      - name: Run benchmark helper tests
        run: julia --project=benchmarks benchmarks/test/runtests.jl
      - name: Save benchmark Julia package state
        if: ${{ success() && steps.benchmark-final-key.outputs.key != steps.benchmark-restore.outputs.cache-matched-key }}
        uses: actions/cache/save@v6
        with:
          path: |
            ~/.julia/artifacts
            ~/.julia/compiled
            ~/.julia/packages
            ~/.julia/registries
          key: ${{ steps.benchmark-final-key.outputs.key }}

  notebook-tests:
    name: Notebook Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: "1"
      - uses: actions/cache@v6
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-notebook-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-notebook-${{ env.cache-name }}-
            ${{ runner.os }}-notebook-
            ${{ runner.os }}-
      - name: Instantiate examples environment
        run: julia --project=examples -e 'using Pkg; Pkg.develop(path="."); Pkg.instantiate()'
      - name: Execute notebooks
        env:
          # 02 excluded — too slow for PR CI (~3 hours without time limits)
          NOTEBOOKS: "00_quickstart.ipynb,01_importing_your_own_neural_net.ipynb,03_interpreting_the_output_of_find_adversarial_example.ipynb,04_managing_log_output.ipynb"
        run: julia --project=examples examples/test/runtests.jl

  format-check-prettier:
    name: "Check Formatting (.md, .yaml)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - name: "Verify that Prettier does not find any code style issues."
        uses: creyD/prettier_action@v4.3
        with:
          # Keep this version in sync with scripts/format.sh. Without a pin, the action
          # installs the latest Prettier, and new releases change formatting rules and
          # break CI on unchanged files.
          prettier_version: "3.9.5"
          prettier_options: --check **/*.{md,yaml}

  lint-workflows:
    name: "Lint GitHub Actions Workflows"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: "Verify that actionlint finds no issues in .github/workflows."
        # Pinned so new lint rules cannot break CI on unchanged files. The image
        # bundles shellcheck and pyflakes, so `run:` blocks are checked too.
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color
